<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Winnit OS</title>

<link href="https://fonts.googleapis.com/css2?family=Cantarell:wght@700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    font-family: 'Cantarell', sans-serif;
    cursor: pointer;
}

/* background */
.bg {
    position: absolute;
    width: 100%;
    height: 100%;
    background-size: cover;
    background-position: center;
    filter: blur(6px) brightness(1.2);
    transform: scale(1.1);
    transition: filter 0.4s ease;
}

.bg.focused {
    filter: blur(12px) brightness(0.9);
}

.overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    background: linear-gradient(rgba(34,197,94,0.2), rgba(15,23,42,0.3));
}

/* boot */
.boot {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100%;
}

.title {
    font-size: 96px;
    color: #f1f5f9;
    text-shadow: 0 6px 30px rgba(0,0,0,0.7),
                 0 0 20px rgba(34,197,94,0.4);
    opacity: 0;
    transform: translateY(20px);
    animation: fadeIn 1.2s ease forwards;
    animation-delay: 0.5s;
}

.continue {
    position: absolute;
    bottom: 40px;
    width: 100%;
    text-align: center;
    font-size: 18px;
    color: #e2e8f0;
    opacity: 0;
    animation: fadeIn 1.5s ease forwards;
    animation-delay: 1.5s;
}

/* LOGIN */
.login {
    position: absolute;
    width: 100%;
    height: 100%;
    display: none;
    justify-content: center;
    align-items: center;
    opacity: 0;
    transform: scale(0.98);
    transition: opacity 0.8s ease, transform 0.8s ease;
}

.login.show {
    opacity: 1;
    transform: scale(1);
}

.login-box {
    position: relative;
    background: rgba(0,0,0,0.35);
    backdrop-filter: blur(12px);
    padding: 40px;
    border-radius: 14px;
    text-align: center;
    color: white;
    min-width: 260px;
}

/* user */
.user {
    margin-bottom: 20px;
    transition: opacity 0.25s ease, transform 0.25s ease;
}

.avatar {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    background: center/cover;
    margin: 0 auto 10px;
    border: 2px solid rgba(255,255,255,0.25);
}

.label {
    font-size: 16px;
    color: #e2e8f0;
    opacity: 0.9;
}

/* arrows */
.nav-circle {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 58px;
    height: 58px;
    border-radius: 50%;

    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(14px);

    display: flex;
    align-items: center;
    justify-content: center;

    font-size: 28px;
    color: white;

    border: 1px solid rgba(255,255,255,0.15);
    cursor: pointer;

    transition: 0.25s ease;
    user-select: none;
}

.nav-circle:hover {
    background: rgba(255,255,255,0.15);
    transform: translateY(-50%) scale(1.08);
}

.nav-circle.left {
    left: -90px;
}

.nav-circle.right {
    right: -90px;
}

.login-box input {
    display: block;
    margin: 12px auto;
    padding: 10px;
    width: 220px;
    border: none;
    border-radius: 6px;
    outline: none;
}

/* shake */
@keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    50% { transform: translateX(6px); }
    75% { transform: translateX(-4px); }
}

.login-box.shake {
    animation: shake 0.35s ease;
}

/* carousel animations */
.user.out-left {
    animation: outLeft 0.25s ease forwards;
}
.user.out-right {
    animation: outRight 0.25s ease forwards;
}
.user.in-left {
    animation: inLeft 0.25s ease forwards;
}
.user.in-right {
    animation: inRight 0.25s ease forwards;
}

@keyframes outLeft {
    to { opacity: 0; transform: translateX(-35px) scale(0.95); filter: blur(2px); }
}
@keyframes outRight {
    to { opacity: 0; transform: translateX(35px) scale(0.95); filter: blur(2px); }
}
@keyframes inLeft {
    from { opacity: 0; transform: translateX(35px) scale(0.95); filter: blur(2px); }
    to { opacity: 1; transform: translateX(0) scale(1); filter: blur(0); }
}
@keyframes inRight {
    from { opacity: 0; transform: translateX(-35px) scale(0.95); filter: blur(2px); }
    to { opacity: 1; transform: translateX(0) scale(1); filter: blur(0); }
}

@keyframes fadeIn {
    to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body onclick="continueBoot()">

<div class="bg" id="bg"></div>
<div class="overlay"></div>

<!-- Boot -->
<div class="boot" id="boot">
    <div class="title">Winnit OS</div>
</div>

<div class="continue" id="continueText">Click to continue</div>

<!-- Login -->
<div class="login" id="login">
    <div class="login-box" id="loginBox">

        <div class="nav-circle left" onclick="switchUser(-1)">‹</div>
        <div class="nav-circle right" onclick="switchUser(1)">›</div>

        <div class="user">
            <div class="avatar" id="avatar"></div>
            <div class="label" id="label"></div>
        </div>

        <h2>Sign In</h2>
        <input type="password" id="password" placeholder="Password">
        <button onclick="fakeLogin()">Login</button>
    </div>
</div>

<script>
const users = [
    { label: "Default", avatar: "https://cdn-icons-png.flaticon.com/512/149/149071.png" },
    { label: "Admin", avatar: "https://cdn-icons-png.flaticon.com/512/2202/2202112.png" },
    { label: "Guest", avatar: "https://cdn-icons-png.flaticon.com/512/1144/1144760.png" }
];

let currentUser = 0;

/* background */
const images = [
"https://images.unsplash.com/photo-1501785888041-af3ef285b470?w=1920",
"https://images.unsplash.com/photo-1470770841072-f978cf4d019e?w=1920",
"https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?w=1920",
"https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=1920"
];

document.getElementById("bg").style.backgroundImage =
`url('${images[Math.floor(Math.random() * images.length)]}')`;

/* render user */
function renderUser() {
    const data = users[currentUser];
    document.getElementById("avatar").style.backgroundImage = `url('${data.avatar}')`;
    document.getElementById("label").innerText = data.label;
}

/* switch carousel */
function switchUser(dir) {
    const userEl = document.querySelector(".user");
    const goingLeft = dir < 0;

    userEl.classList.remove("in-left","in-right");
    userEl.classList.add(goingLeft ? "out-right" : "out-left");

    setTimeout(() => {
        currentUser += dir;

        if (currentUser < 0) currentUser = users.length - 1;
        if (currentUser >= users.length) currentUser = 0;

        renderUser();

        userEl.classList.remove("out-left","out-right");
        userEl.classList.add(goingLeft ? "in-left" : "in-right");

        setTimeout(() => {
            userEl.classList.remove("in-left","in-right");
        }, 260);

    }, 120);
}

/* boot */
function continueBoot() {
    document.getElementById("boot").style.display = "none";
    document.getElementById("continueText").style.display = "none";

    const login = document.getElementById("login");
    login.style.display = "flex";

    setTimeout(() => {
        login.classList.add("show");
        renderUser();
    }, 50);
}

/* password focus blur */
const password = document.getElementById("password");
const bg = document.getElementById("bg");

password.addEventListener("focus", () => bg.classList.add("focused"));
password.addEventListener("blur", () => bg.classList.remove("focused"));

/* fake login */
function fakeLogin() {
    const box = document.getElementById("loginBox");
    box.classList.remove("shake");
    void box.offsetWidth;
    box.classList.add("shake");
}
</script>

</body>
</html>
